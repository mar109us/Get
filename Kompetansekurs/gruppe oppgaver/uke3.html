			const elements = document.querySelectorAll("body")

			/* funksjon for layout knapp 1 */
			function buttonNoLayout() {
				elements.forEach((element) => {
					element.style.display = "block"
				})
			}

			/* funksjon for layout knapp 2 */
			function buttonVerticalLayout() {
				elements.forEach((element) => {
					element.style.display = "flex"
					element.style.flexDirection = "column"
				})
			}

			/* funksjon for layout knapp 3 */
			function buttonHorizontalLayout() {
				elements.forEach((element) => {
					element.style.display = "flex"
					element.style.flexDirection = "row"
				})
			}

			/* funksjon for layout knapp 4 */
			function buttonGridLayout() {
				elements.forEach((element) => {
					element.style.display = "grid"
					element.style.gridTemplateColumns = "repeat(2, 50%)"
					element.style.width = "auto"
					element.style.height = "auto"
				})
			}
