<!doctype html>
<html lang="no">

<head>
	<meta charset="UTF-8" />
	<title>Rutenett</title>
	<style>
		:root {
			user-select: none;

			--background: #1d2021;
			--highlight: #665c54;
			--gray: #928374;
			--bright_red: #fb4934;
			--bright_green: #b8bb26;
			--bright_yellow: #fabd2f;
			--bright_blue: #83a598;
			--bright_purple: #d3869b;
			--bright_aqua: #8ec07c;
			--bright_orange: #fe8019;
		}

		body {
			background-color: var(--background);
			color: var(--gray);
		}

		.selected {
			background-color: var(--bright_yellow);
		}

		#app {
			display: grid;
			grid-template-columns: repeat(8, 100px);
			grid-template-rows: repeat(8, 100px);
			justify-content: center;
		}

		#app>div {
			border: 1px solid var(--highlight);
		}

		.dpad {
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-items: center;
			justify-content: center;
			gap: 5px;
			margin: 20px 150px;
			width: 500px;
		}

		.dpad-row {
			display: flex;
			justify-content: center;
			gap: 5px;
		}

		.dpad button {
			width: 80px;
			height: 80px;

		}

		.dpad button:hover {
			background-color: var(--highlight);
			color: var(--background);
		}

		button {
			font-family: 'Arial Unicode MS', 'Consolas';
			font-size: 3em;
			background-color: var(--gray);
			color: var(--highlight);
			border: 2px solid var(--background);
			border-radius: 10px;
			cursor: pointer;
			transition: background-color 0.2s;
		}

		.cordinates {
			display: flex;
			justify-content: right;
			font-family: monospace;
			font-size: 2em;
		}

		.pageElements {
			display: grid;
			grid-template-columns: 1fr 1fr 1fr;
		}
	</style>
</head>

<body>

	<div class="pageElements">
		<div class="dpad">
			<div class="dpad-row">
				<button class="left" onclick="moveTopLeft()">🡬</button>
				<button class="up" onclick="moveUp()">🢁</button>
				<button class="right" onclick="moveTopRight()">🡭</button>
			</div>

			<div class="dpad-row">
				<button class="left" onclick="moveLeft()">🢀</button>
				<button></button>
				<button class="right" onclick="moveRight()">🢂</button>
			</div>

			<div class="dpad-row">
				<button class="left" onclick="moveBotLeft()">🡯</button>
				<button class="up" onclick="moveDown()">🢃</button>
				<button class="right" onclick="moveBotRight()">🡮</button>
			</div>
		</div>

		<div id="app"></div>

		<div id="currentPosition" class="cordinates"></div>
	</div>
	<script>

		const size = 64;
		const pattern = `<div></div>`;
		const highlightSquare = `<div class="selected"></div>`;
		const mainDiv = document.getElementById("app");
		const printPosition = document.getElementById("currentPosition");

		const initBoardStart = 0
		const initBoardEnd = 63

		let boardStart = 0
		let yellowSquareIndex = 0
		let boardEnd = 63

		let rowCordinate
		let columnCordinate

		function calculatePosition(action) {
			if (action === "moveRight" && yellowSquareIndex % 8 === 0) {
				yellowSquareIndex -= 8
			}

			if (action === "moveLeft" && (yellowSquareIndex + 1) % 8 === 0) {
				yellowSquareIndex += 8
			}

			if (action === "moveTopLeft") {
				if (yellowSquareIndex + 1 % 8 === 0) {
					yellowSquareIndex -= 16
				}
				else {
					yellowSquareIndex -= 9
				}
			}

			if (action === "moveTopRight") {
				if (yellowSquareIndex % 8 === 0) {
					yellowSquareIndex -= 14
				}
				else {
					yellowSquareIndex -= 7
				}
			}

			if (action === "moveBotLeft") {
				if (yellowSquareIndex + 1 % 8 === 0) {
					yellowSquareIndex += 14
				}
				else {
					yellowSquareIndex += 7
				}
			}

			if (action === "moveBotRight") {
				if (yellowSquareIndex + 1 % 8 === 0) {
					yellowSquareIndex += 16
				}
				else {
					yellowSquareIndex += 9
				}
			}

			if (yellowSquareIndex < initBoardStart) {
				yellowSquareIndex = initBoardEnd + yellowSquareIndex + 1
			}
			if (yellowSquareIndex > initBoardEnd) {
				yellowSquareIndex = yellowSquareIndex - initBoardEnd - 1
			}

			boardStart = initBoardStart
			boardEnd = initBoardEnd

			boardStart = boardStart + yellowSquareIndex
			boardEnd = boardEnd - yellowSquareIndex
		}

		function showBoard(action) {
			calculatePosition(action)
			mainDiv.innerHTML = ``;
			drawPattern(boardStart)
			mainDiv.innerHTML += highlightSquare;
			drawPattern((boardEnd));
			updateCordinates()
		}

		function updateCordinates() {
			rowCordinate = Math.floor(yellowSquareIndex / 8) + 1
			columnCordinate = (yellowSquareIndex % 8) + 1
			printPosition.innerHTML = `Row: ${rowCordinate}<br>Column: ${columnCordinate}`
		}

		function drawPattern(amount) {
			mainDiv.innerHTML += pattern.repeat(amount);
		}

		function moveRight() {
			yellowSquareIndex += 1
			showBoard("moveRight")
		}

		function moveLeft() {
			yellowSquareIndex -= 1
			showBoard("moveLeft")
		}

		function moveDown() {
			yellowSquareIndex += 8
			showBoard("moveDown")
		}

		function moveUp() {
			yellowSquareIndex -= 8
			showBoard("moveUp")
		}

		function moveTopLeft() {
			showBoard("moveTopLeft")
		}

		function moveTopRight() {
			showBoard("moveTopRight")
		}

		function moveBotLeft() {
			showBoard("moveBotLeft")
		}

		function moveBotRight() {
			showBoard("moveBotRight")
		}

		showBoard();
	</script>
</body>

</html>
