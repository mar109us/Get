<!doctype html>
<html lang="no">

<head>
	<meta charset="UTF-8" />
	<title>Rutenett</title>
	<style>
		.selected {
			background-color: yellow;
		}

		#app {
			display: grid;
			grid-template-columns: repeat(8, 100px);
			grid-template-rows: repeat(8, 100px);
		}

		#app>div {
			border: 1px solid lightblue;
		}

		.dpad {
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 5px;
			margin: 20px 150px;
			width: 500px;
		}

		.dpad-middle {
			display: flex;
			justify-content: center;
			gap: 5px;
		}

		.dpad button {
			width: 50px;
			height: 50px;
			font-size: 24px;
			background-color: #eee;
			border: 2px solid #999;
			border-radius: 10px;
			cursor: pointer;
			transition: background-color 0.2s;
		}

		.dpad button:hover {
			background-color: #ccc;
		}

		.cordinates {
			font-family: monospace;
			font-size: 2em;
		}
	</style>
</head>

<body>


	<div id="app"></div>

	<div class="dpad">
		<button class="up" onclick="moveUp()">⬆️</button>
		<div class="dpad-middle">
			<button class="left" onclick="moveLeft()">⬅️</button>
			<button class="down" onclick="moveDown()">⬇️</button>
			<button class="right" onclick="moveRight()">➡️</button>
		</div>
	</div>
	<div id="currentPosition" class="cordinates">test</div>
	<script>

		const size = 64;
		const pattern = `<div></div>`;
		const highlightSquare = `<div class="selected"></div>`;
		const mainDiv = document.getElementById("app");
		const printPosition = document.getElementById("currentPosition");

		const initBoardStart = 0
		const initBoardEnd = 63

		let boardStart = 0
		let yellowSquareIndex = 0
		let boardEnd = 63

		let rowCordinate
		let columnCordinate

		function calculatePosition(action) {
			if (action === "moveRight" && yellowSquareIndex % 8 === 0) {
				yellowSquareIndex -= 8
			}

			if (action === "moveLeft" && (yellowSquareIndex + 1) % 8 === 0) {
				yellowSquareIndex += 8
			}

			if (yellowSquareIndex < initBoardStart) {
				yellowSquareIndex = initBoardEnd + yellowSquareIndex + 1
			}
			if (yellowSquareIndex > initBoardEnd) {
				yellowSquareIndex = yellowSquareIndex - initBoardEnd - 1
			}

			boardStart = initBoardStart
			boardEnd = initBoardEnd

			boardStart = boardStart + yellowSquareIndex
			boardEnd = boardEnd - yellowSquareIndex
		}

		function showBoard(action) {
			calculatePosition(action)
			mainDiv.innerHTML = ``;
			drawPattern(boardStart)
			mainDiv.innerHTML += highlightSquare;
			drawPattern((boardEnd));
			updateCordinates()
		}

		function updateCordinates() {
			rowCordinate = Math.floor(yellowSquareIndex / 8) + 1
			columnCordinate = (yellowSquareIndex % 8) + 1
			printPosition.innerHTML = `Row: ${rowCordinate}<br>Column: ${columnCordinate}`
		}

		function drawPattern(amount) {
			mainDiv.innerHTML += pattern.repeat(amount);
		}

		function moveRight() {
			yellowSquareIndex += 1
			showBoard("moveRight")
		}

		function moveLeft() {
			yellowSquareIndex -= 1
			showBoard("moveLeft")
		}

		function moveDown() {
			yellowSquareIndex += 8
			showBoard("moveDown")
		}

		function moveUp() {
			yellowSquareIndex -= 8
			showBoard("moveUp")
		}

		showBoard();
	</script>
</body>

</html>
