<!doctype html>
<html lang="no">

<head>
	<meta charset="UTF-8" />
	<title>Rutenett</title>
	<style>
		:root {
			user-select: none;

			--background: #1d2021;
			--highlight: #665c54;
			--gray: #928374;
			--bright_red: #fb4934;
			--bright_green: #b8bb26;
			--bright_yellow: #fabd2f;
			--bright_blue: #83a598;
			--bright_purple: #d3869b;
			--bright_aqua: #8ec07c;
			--bright_orange: #fe8019;
		}

		body {
			background-color: var(--background);
			color: var(--gray);
		}

		.selected {
			background-color: var(--bright_yellow);
		}

		#app {
			display: grid;
			/* grid-template-columns: repeat(8, 100px); */
			/* grid-template-rows: repeat(8, 100px); */
			justify-content: center;
		}

		#app>div {
			border: 1px solid var(--highlight);
		}

		.dpad {
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-items: center;
			justify-content: center;
			gap: 5px;
			margin: 20px 150px;
			width: 500px;
		}

		.dpad-row {
			display: flex;
			justify-content: center;
			gap: 5px;
		}

		.dpad button {
			width: 80px;
			height: 80px;

		}

		.dpad button:hover {
			background-color: var(--highlight);
			color: var(--background);
		}

		button {
			font-family: 'Arial Unicode MS', 'Consolas';
			font-size: 3em;
			background-color: var(--gray);
			color: var(--highlight);
			border: 2px solid var(--background);
			border-radius: 10px;
			cursor: pointer;
			transition: background-color 0.2s;
		}

		.cordinates {
			display: flex;
			justify-content: right;
			font-family: monospace;
			font-size: 2em;
		}

		.pageElements {
			display: grid;
			grid-template-columns: 1fr 1fr 1fr;
		}
	</style>
</head>

<body>
	<div class="pageElements">
		<div class="dpad">
			<div class="dpad-row">
				<button class="left" onclick="moveTopLeft()">🡬</button>
				<button class="up" onclick="moveUp()">🢁</button>
				<button class="right" onclick="moveTopRight()">🡭</button>
			</div>

			<div class="dpad-row">
				<button class="left" onclick="moveLeft()">🢀</button>
				<button></button>
				<button class="right" onclick="moveRight()">🢂</button>
			</div>

			<div class="dpad-row">
				<button class="left" onclick="moveBotLeft()">🡯</button>
				<button class="up" onclick="moveDown()">🢃</button>
				<button class="right" onclick="moveBotRight()">🡮</button>
			</div>
		</div>

		<div id="app"></div>

		<div id="currentPosition" class="cordinates"></div>
	</div>
	<script>

		//model

		const pattern = `<div></div>`
		const highlightSquare = `<div class="selected"></div>`
		const mainDiv = document.getElementById("app")
		const printPosition = document.getElementById("currentPosition")
		const boardStyle = document.getElementById("app")

		let setSize = 4
		
		let row = setSize
		let column = setSize

		const size = row * column

		const initBoardStart = 0
		const initBoardEnd = size - 1

		let boardStart = 0
		let selectedSquare = 0
		let boardEnd = size - 1

		let rowCordinate = Math.floor(selectedSquare / setSize) + 1
		let columnCordinate = (selectedSquare % setSize) + 1

		boardStyle.style.gridTemplateColumns = `repeat(${setSize}, 100px)`
		boardStyle.style.gridTemplateRows = `repeat(${setSize}, 100px)`

		function updateBoard(action) {
			if (action === "moveLeft" || action === "moveTopLeft" || action === "moveBotLeft") {
				if ((selectedSquare + 1) % setSize === 0) {
					selectedSquare += setSize
				}
			}

			if (action === "moveRight" || action === "moveTopRight" || action === "moveBotRight") {
				if (selectedSquare % setSize === 0) {
					selectedSquare -= setSize
				}
			}

			if (selectedSquare < initBoardStart) {
				selectedSquare = initBoardEnd + selectedSquare + 1
			}
			if (selectedSquare > initBoardEnd) {
				selectedSquare = selectedSquare - initBoardEnd - 1
			}

			boardStart = initBoardStart
			boardEnd = initBoardEnd

			boardStart = boardStart + selectedSquare
			boardEnd = boardEnd - selectedSquare
		}

		function updateCordinates() {
			rowCordinate = Math.floor(selectedSquare / setSize) + 1
			columnCordinate = (selectedSquare % setSize) + 1
		}

		//view
		function drawBoard(start, select, end) {
			mainDiv.innerHTML = `
				${start}
				${select}
				${end}`
		}

		function drawCordinates(row, column) {
			printPosition.innerHTML = `
			Row: ${row}<br>
			Column: ${column}`
		}

		//controller
		function updateView(action) {
			updateBoard(action)
			drawBoard(
				pattern.repeat(boardStart),
				highlightSquare,
				pattern.repeat(boardEnd))
			updateCordinates()
			drawCordinates(
				rowCordinate,
				columnCordinate)
		}

		function moveRight() {
			selectedSquare += 1
			updateView("moveRight")
		}

		function moveLeft() {
			selectedSquare -= 1
			updateView("moveLeft")
		}

		function moveDown() {
			selectedSquare += setSize
			updateView("moveDown")
		}

		function moveUp() {
			selectedSquare -= setSize
			updateView("moveUp")
		}

		function moveTopLeft() {
			selectedSquare -= setSize + 1
			updateView("moveTopLeft")
		}

		function moveTopRight() {
			selectedSquare -= setSize - 1
			updateView("moveTopRight")
		}

		function moveBotLeft() {
			selectedSquare += setSize - 1
			updateView("moveBotLeft")
		}

		function moveBotRight() {
			selectedSquare += setSize + 1
			updateView("moveBotRight")
		}

		updateView();
	</script>
</body>

</html>
