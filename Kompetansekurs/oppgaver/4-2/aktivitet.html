	<title>chess</title>

		color: beige;
	}

	#output {
		background-color: black;
		width: 800px;
		height: 800px;
		display: grid;
		grid-template-columns: repeat(8, 100px);
		grid-template-rows: repeat(8, 100px);

	.dark {

		height: 100px;
		background-color: rgb(121, 93, 58);
	}

	.light {

		background-color: rgb(195, 167, 133);
	}
</style>

<body>

</body>
