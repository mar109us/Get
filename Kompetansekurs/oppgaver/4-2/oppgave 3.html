<!doctype html>
<html lang="no">

<head>
	<meta charset="UTF-8" />
	<title>Strengutforsker</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			padding: 32px;
			background: #666666;
			max-width: 600px;
		}

		input,
		button {
			font-size: 16px;
			padding: 10px;
			margin: 6px;
			border-radius: 6px;
			border: 2px solid #ccc;
		}

		button {
			background: #005f99;
			color: white;
			border: none;
			cursor: pointer;
		}

		.rad {
			background: white;
			padding: 12px 16px;
			border-radius: 8px;
			margin: 6px 0;
			font-size: 17px;
		}

		.etikett {
			font-weight: bold;
			color: #005f99;
			display: inline-block;
			min-width: 200px;
		}

		.ja {
			color: #43a047;
			font-weight: bold;
		}

		.nei {
			color: #e53935;
			font-weight: bold;
		}
	</style>
</head>

<body>
	<h1>Strengutforsker</h1>
	<p>Skriv inn en tekst og se hva ulike metoder gjør med den.</p>

	<input id="tekst" type="text" placeholder='Prøv: "  Hei Verden!  "' />
	<button onclick="analyser()">Analyser</button>

	<div id="output"></div>

	<script>

		let text = document.getElementById("tekst")

		let textValue
		let textString

		let length
		let uppercase
		let lowercase
		let doTrim
		let charPosition
		let eIncluded
		let ePosition
		let replaceFirst
		let setClass

		function analyser() {
			textValue = text.value
			textString = text.value.toString()

			length = textString.length
			uppercase = textString.toUpperCase()
			lowercase = textString.toLowerCase()
			doTrim = textString.trim()
			charPosition = textString.charAt(0)

			if (textString.includes("e")) {
				setClass = `class="ja"`
				eIncluded = "ja"
				ePosition = textString.indexOf("e")
			}
			else {
				setClass = `class="nei"`
				eIncluded = "nei"
				ePosition = "-1"
			}

			replaceFirst = textString.replace(textString.charAt(0), "★")


			kort()
		}

		function kort() {

			document.getElementById("output").innerHTML = `
			<div>Lengde (length): ${length}</div>
			<div>Stor skrift: ${uppercase}</div>
			<div>Liten skrift: ${lowercase}</div>
			<div>Uten mellomrom (trim): ${doTrim}</div>
			<div>Første tegn (charAt): ${charPosition}</div>
			<div ${setClass}>Inneholder 'e': ${eIncluded}</div>
			<div ${setClass}>Posisjon til 'e': ${ePosition}</div>
			<div>Etter replace: ${replaceFirst}</div>
			
			`

		}

		// OPPGAVE 3: Strengmetoder

		// Lag funksjonen analyser()
		// Den skal lese teksten fra #tekst og vise disse radene i #output:

		// "Lengde (length):"         antall tegn
		// "Stor skrift:"             toUpperCase()
		// "Liten skrift:"            toLowerCase()
		// "Uten mellomrom (trim):"   trim()
		// "Første tegn (charAt):"    charAt(0)
		// "Inneholder 'e':"          includes("e") — vis "Ja" eller "Nei"
		// "Posisjon til 'e':"        indexOf("e") — vis -1 hvis ikke funnet
		// "Etter replace:"           replace første tegn med "★"
		//                            Tips: tekst.replace(tekst.charAt(0), "★")

		// For "Ja"/"Nei"-raden: bruk class="ja" eller class="nei" på svaret

		// Bonus: legg til en rad som viser teksten snudd baklengs
		// Tips: tekst.split("").reverse().join("")
	</script>
</body>

</html>
