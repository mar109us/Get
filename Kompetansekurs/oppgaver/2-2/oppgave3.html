<!DOCTYPE html>
<html lang="no">

<head>
	<meta charset="UTF-8">
	<title>If-setning</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			padding: 32px;
			background: #f0f4f8;
		}

		input,
		button {
			font-size: 18px;
			padding: 10px 16px;
			margin: 6px;
		}

		#svar {
			font-size: 24px;
			margin-top: 20px;
			font-weight: bold;
		}
	</style>
</head>

<body>

	<h1>Hva slags billett?</h1>
	<p>Skriv inn alderen til en person og få vite hvilken billett de skal ha.</p>


	<input type="text" name="age" id="input-age">
	<button onclick="checkTicket()">Sjekk type billett</button>


	<p id="svar"></p>

	<script>

		function checkTicket() {
			let setAge = Number(document.getElementById("input-age").value)
			let sendResult = document.getElementById("svar")


			if (setAge < 6) {
				displayResult("Gratis")
			}
			if (setAge >= 6) {
				displayResult("Barnebillett")
			}
			if (setAge >= 18) {
				displayResult("Voksenbillett")
			}
			if (setAge >= 67) {
				displayResult("Pensjonistbillett")
			}

			function displayResult(result) {
				sendResult.innerHTML = result
			}

		}



		// Lag funksjonen sjekkBillett()
		// Den skal lese alderen fra inputfeltet og vise riktig billettype i #svar:

		// Under 6 år    → "Gratis"
		// 6–17 år       → "Barnebillett"
		// 18–66 år      → "Voksenbillett"
		// 67 år eller mer → "Pensjonistbillett"

		// Tips: bruk if / else if / else

	</script>

</body>

</html>
