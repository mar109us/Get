<!doctype html>
<html lang="no">

<head>
	<meta charset="UTF-8" />
	<title>Stemmeteller – MVC</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			padding: 32px;
			max-width: 500px;

			background-color: #75828f;

			user-select: none;

		}

		.container {
			display: flex;
			flex-direction: row;
			flex-wrap: wrap;
			justify-content: space-evenly;
			gap: 10px 10px;

		}

		.button {
			padding-left: 20px;
			padding-right: 20px;

			background-color: beige;
		}

		.result-bar-style {
			background: #555555;
			/* background: linear-gradient(to right, rgb(39, 110, 0) 0%, rgb(155, 221, 120) 50%, rgb(220, 90, 90) 50%, rgb(110, 1, 1) 100%); */
			width: 100%;
		}

		#status-message {}

		.vote-result {}

		/* Lag CSS som gjør siden presentabel.
           Du trenger minst:
           - stil på knappene
           - stil på #status-meldingen
           - stil på stemme-visningen */
	</style>
</head>

<body>
	<h1>Stemmeteller</h1>
	<p>En enkel app der du kan stemme for eller mot et forslag.</p>

	<!-- Legg til to knapper: "For" og "Mot" -->
	<!-- Og en "Nullstill"-knapp -->
	<div class="container">
		<div onclick="buttonVote()" class="button">
			<h2>Vote</h2>
		</div>
		<div onclick="buttonVoteAgainst()" class="button">
			<h2>Vote Against</h2>
		</div>
		<div onclick="buttonClear()" class="button">
			<h2>Clear</h2>
		</div>

		<!-- Lag et element som viser: "For: X | Mot: Y" -->
		<div class="result-bar-style" id="change-result-bar">
			<div class="container" id="current-votes"></div>
		</div>

		<!-- Lag et element som viser en statusmelding, f.eks. "Det er flertall for!" -->
		<div class="container" id="current-result"></div>
	</div>


	<script>
		// OPPGAVE: Bygg stemmetelleren i MVC-stil

		// ---- MODEL ----
		// Lag to variabler: stemmerFor og stemmerMot
		// Begge starter på 0
		let vote = 0
		let voteAgainst = 0



		// ---- VIEW ----
		// Lag en funksjon render() som:
		// 1. Oppdaterer visningen med antall stemmer for og mot
		// 2. Viser en statusmelding:
		//    - "Det er flertall for!" hvis stemmerFor > stemmerMot
		//    - "Det er flertall mot!" hvis stemmerMot > stemmerFor
		//    - "Det er uavgjort!" hvis de er like
		// render() skal ALDRI endre model — bare lese fra den
		function render() {

			const changeCurrentVotes = document.getElementById("current-votes")

			changeCurrentVotes.innerHTML = `<h2>For: ${vote} | Against: ${voteAgainst}</h2>`

			const changeCurrentResult = document.getElementById("current-result")

			const changeVisualVote = document.getElementById("change-result-bar")

			changeVisualVote.style = ` background-image: linear-gradient(to right, rgb(39, 110, 0) 0%, rgb(155, 221, 120) 50%, rgb(220, 90, 90) 50%, rgb(110, 1, 1) 100%);`

			console.log(changeVisualVote.style.background)
			/* background: linear-gradient(to right, rgb(39, 110, 0) 0%, rgb(155, 221, 120) 50%, rgb(220, 90, 90) 50%, rgb(110, 1, 1) 100%); */



			if (vote > voteAgainst) {
				changeCurrentResult.innerHTML = "<h2>Majority voted for</h2>"
			}
			if (voteAgainst > vote) {
				changeCurrentResult.innerHTML = "<h2>Majority voted against</h2>"
			}
			if (voteAgainst === vote) {
				changeCurrentResult.innerHTML = "<h2>Tied vote</h2>"
			}
			if (vote === 0 && voteAgainst === 0) {
				changeCurrentResult.innerHTML = "<h2>No votes yet</h2>"
			}
		}

		// ---- CONTROLLER ----
		// Lag tre funksjoner: stemmFor(), stemmMot(), nullstill()
		// Hver funksjon skal:
		// 1. Oppdatere riktig modellvariabel
		// 2. Kalle render()
		// Controller-funksjoner skal ALDRI endre HTML direkte


		function buttonVote() {
			vote += 1
			render()
		}

		function buttonVoteAgainst() {
			voteAgainst += 1
			render()
		}

		function buttonClear() {
			vote = 0
			voteAgainst = 0
			render()
		}
		
		// Kall render() én gang nederst slik at siden vises korrekt ved oppstart
		render()





	</script>
</body>

</html>
