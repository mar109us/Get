<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Name and age</title>
</head>

<style>
	body {
		background-color: black;
		font-family: monospace;
	}

	input {
		width: 40%;
		height: 100px;
		font-size: 80px;
	}

	h1 {
		color: white;
		font-size: 80px;
		text-align: left;
		width: 40%;
		padding-left: 7%;

	}

	h2 {
		color: white;
		font-size: 40px;
		text-align: left;
		width: 40%;
		padding-left: 7%;

	}

	h4 {
		color: rgb(146, 146, 146);
		font-size: 20px;
		text-align: left;
		width: 40%;
		padding-left: 7%;
	}

	.container {
		display: flex;
		flex-direction: row;
		flex-wrap: wrap;
		justify-content: space-evenly;
	}

	.text-container {
		display: flex;
		flex-direction: row;
		flex-wrap: wrap;
	}

	.test {
		justify-items: center;
	}
</style>

<body>

	<div class="text-container">
		<h1>Name</h1>
		<h1>Age</h1>
	</div>

	<div class="container">
		<input oninput="changeName()" id="name-input" type="text" placeholder="name..."></form>
		<input oninput="changeAge()" id="age-input" type="text" placeholder="age..."></form>
	</div>

	<div class="text-container">
		<h4>Must contain 2 letters or more<br>Must contain 1 special character<br>Must be divided by 4</h4>
		<h4>Must be 18 or older<br>Must be in milliseconds</h4>
	</div>

	<div class="text-container">
		<h2 id="name-output">Output</h2>
		<h2 id="age-output">Output</h2>
	</div>

	<script>

		//model
		const specialCharacters = /[`!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?~]/

		const colorPass = `#b8bb26`
		const colorFail = `#fb4934`
		let currentOutput = 0

		const dataLogic = {
			name: {
				pass: "hello ",
				fail: {
					short: ` not accepted as a name`,
					divide: `Not dividing by 4`,
					special: `No special characters`
				}
			}
		}

		//view
		const getElement = (calledId) => document.getElementById(calledId)

		const element = {
			write: {
				name: getElement("name-input"),
				age: getElement("age-input")
			},
			print: {
				name: getElement("name-output"),
				age: getElement("age-output")
			}
		}

		function updateView(from, data, color) {

			if (from === "name") {
				element.print.name.innerHTML = data
				element.print.name.style.color = color
			}

			if (from === "age") {
				element.print.age.innerHTML = data
				element.print.age.style.color = color
			}
		}

		//controller
		function changeName() {

			if (element.write.name.value.length < 2) {
				updateView("name", element.write.name.value + dataLogic.name.fail.short, colorFail)
			}

			else if (!specialCharacters.test(element.write.name.value)) {
				updateView("name", dataLogic.name.fail.special, colorFail)
			}

			else if (!element.write.name.value.includes("/4")) {
				updateView("name", dataLogic.name.fail.divide, colorFail)
			}

			else {
				nameToNumber()
				updateView("name", dataLogic.name.pass + currentOutput, colorPass)
			}
		}

		function nameToNumber() {
			currentOutput = Math.round(parseInt(element.write.name.value.replaceAll("/4", ""), 36) / 4)
		}

		function changeAge() {
			calculateAge = Math.round(element.write.age.value / 31557600000)

			if (calculateAge < 18) {
				updateView("age", calculateAge + " years old - Not old enough", colorFail)
			}

			if (calculateAge >= 18) {
				updateView("age", calculateAge + " years old - Old enough", colorPass)
			}
		}
	</script>
</body>

</html>
