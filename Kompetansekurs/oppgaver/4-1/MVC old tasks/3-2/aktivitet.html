<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Name and age</title>
</head>

<style>
	body {
		background-color: black;
		font-family: monospace;
	}

	input {
		width: 40%;
		height: 100px;
		font-size: 80px;
	}

	h1 {
		color: white;
		font-size: 80px;
		text-align: left;
		width: 40%;
		padding-left: 7%;

	}

	h2 {
		color: white;
		font-size: 40px;
		text-align: left;
		width: 40%;
		padding-left: 7%;

	}

	h4 {
		color: rgb(146, 146, 146);
		font-size: 20px;
		text-align: left;
		width: 40%;
		padding-left: 7%;
	}

	.container {
		display: flex;
		flex-direction: row;
		flex-wrap: wrap;
		justify-content: space-evenly;
	}

	.text-container {
		display: flex;
		flex-direction: row;
		flex-wrap: wrap;
	}

	.test {
		justify-items: center;
	}
</style>

<body>

	<div class="text-container">
		<h1>Name</h1>
		<h1>Age</h1>
	</div>

	<div class="container">
		<input oninput="checkSignal(`name`)" id="name-input" type="text" placeholder="name..."></form>
		<input oninput="checkSignal(`age`)" id="age-input" type="text" placeholder="age..."></form>
	</div>

	<div class="text-container">
		<h4>Must contain 2 letters or more<br>Must contain 1 special character<br>Must be divided by 4</h4>
		<h4>Must be 18 or older<br>Must be in milliseconds</h4>
	</div>

	<div class="text-container">
		<h2 id="name-output">Output</h2>
		<h2 id="age-output">Output</h2>
	</div>

	<script>

		//model
		const specialCharacters = /[`!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?~]/

		const dataLogic = {
			name: {
				pass: "hello ",
				fail: {
					empty: ``,
					short: ` not accepted as a name`,
					divide: `Not dividing by 4`,
					special: `No special characters`
				}
			},
			age: {
				empty: ``,
				fail: ` years old - Not old enough`,
				pass: ` years old - Old enough`
			}
		}

		function checkName(length, special, divide) {
			if (length === 0 || length === "") {
				modifyView("name", "empty")
			}
			else if (length === 1) {
				modifyView("name", "too-short")
			}
			else if (!special) {
				modifyView("name", "no-special")
			}
			else if (!divide) {
				modifyView("name", "no-divide")
			}
			else {
				modifyView("name", "pass")
			}
		}

		function checkAge(element) {
			if (element === "") {
				modifyView("age", "empty")
			}

			else if (calculateAge(element) < 18) {
				modifyView("age", "fail")
			}

			else {
				modifyView("age", "pass")
			}
		}

		function nameToNumber(element) {
			return Math.round(parseInt(element.replaceAll("/4", ""), 36) / 4)
		}

		function calculateAge(element) {
			return Math.round(element / 31557600000)
		}


		//view
		const getElement = (calledId) => document.getElementById(calledId)
		const colorPass = `#b8bb26`
		const colorFail = `#fb4934`

		const element = {
			write: {
				name: getElement("name-input"),
				age: getElement("age-input")
			},
			print: {
				name: getElement("name-output"),
				age: getElement("age-output")
			}
		}

		function updateView(from, data, color) {

			if (from === "name") {
				element.print.name.innerHTML = data
				element.print.name.style.color = color
			}

			if (from === "age") {
				element.print.age.innerHTML = data
				element.print.age.style.color = color
			}
		}

		//controller	
		function checkSignal(signal) {
			if (signal === "name") {
				checkName(
					element.write.name.value.length,
					specialCharacters.test(element.write.name.value),
					element.write.name.value.includes("/4")
				)
			}

			if (signal === "age") {
				checkAge(element.write.age.value)
			}
		}

		function modifyView(toModify, signal) {

			if (toModify === "name") {
				if (signal === "empty") {
					updateView("name", dataLogic.name.fail.empty, colorFail)
				}
				if (signal === "too-short") {
					updateView("name", element.write.name.value + dataLogic.name.fail.short, colorFail)
				}
				if (signal === "no-special") {
					updateView("name", dataLogic.name.fail.special, colorFail)
				}
				if (signal === "no-divide") {
					updateView("name", dataLogic.name.fail.divide, colorFail)
				}

				if (signal === "pass") {
					updateView("name", dataLogic.name.pass + nameToNumber(element.write.name.value), colorPass)
				}
			}

			if (toModify === "age") {
				if (signal === "empty") {
					updateView("age", dataLogic.age.empty, colorFail)
				}
				if (signal === "fail") {
					updateView("age", calculateAge(element.write.age.value) + dataLogic.age.fail, colorFail)
				}
				if (signal === "pass") {
					updateView("age", calculateAge(element.write.age.value) + dataLogic.age.pass, colorPass)
				}
			}
		}




	</script>
</body>

</html>
