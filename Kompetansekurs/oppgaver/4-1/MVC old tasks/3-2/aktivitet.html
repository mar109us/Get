<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Do something</title>
</head>

<style>
	body {
		background-color: black;
		font-family: monospace;
	}

	input {
		width: 40%;
		height: 100px;
		font-size: 80px;
	}

	h1 {
		color: white;
		font-size: 80px;
		text-align: left;
		width: 40%;
		padding-left: 7%;

	}

	h2 {
		color: white;
		font-size: 40px;
		text-align: left;
		width: 40%;
		padding-left: 7%;

	}

	h4 {
		color: rgb(146, 146, 146);
		font-size: 20px;
		text-align: left;
		width: 40%;
		padding-left: 7%;
	}

	.container {
		display: flex;
		flex-direction: row;
		flex-wrap: wrap;
		justify-content: space-evenly;
	}

	.text-container {
		display: flex;
		flex-direction: row;
		flex-wrap: wrap;
	}

	.test {
		justify-items: center;
	}
</style>

<body>

	<div class="text-container">
		<h1>Name</h1>
		<h1>Age</h1>
	</div>

	<div class="container">
		<input oninput="changeName()" id="name-input" type="text" placeholder="name..."></form>
		<input oninput="changeAge()" id="age-input" type="text" placeholder="age..."></form>
	</div>

	<div class="text-container">
		<h4>Must contain 2 letters or more<br>Must contain 1 special character<br>Must be divided by 4</h4>
		<h4>Must be 18 or older<br>Must be in milliseconds</h4>
	</div>

	<div class="text-container">
		<h2 id="name-output">Output</h2>
		<h2 id="age-output">Output</h2>
	</div>

	<script>

		//model
		const specialCharacters = /[`!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?~]/
		const linkNameInput = document.getElementById("name-input")
		const linkAgeInput = document.getElementById("age-input")
		const linkIsHumanInput = document.getElementById("is-human-input")

		let linkNameOutput = document.getElementById("name-output")
		let linkAgeOutput = document.getElementById("age-output")
		let linkIsHumanOutput = document.getElementById("is-human-output")

		const variables = {
			group1: {
				var1: "test",
				var2: "yes"
			},
			group2: {
				var1: "yy",
				var2: "aa"
			}
		}

		//view
		function viewName(name, color) {
			linkNameOutput.innerHTML = name
			linkNameOutput.style.color = color
		}

		function viewAge(age, color) {
			linkAgeOutput.innerHTML = age
			linkAgeOutput.style.color = color
		}

		//controller
		function changeName() {

			if (linkNameInput.value.length >= 2) {
				viewName(`Hello ${parseInt(linkNameInput.value.replaceAll("/4", ""), 36) / 4}`, `#b8bb26`)
			}

			if (linkNameInput.value.length < 2) {
				viewName(`"${linkNameInput.value}" not accepted as a name`, `#fb4934`)
			}

			if (!linkNameInput.value) {
				viewName(`Can't submit with empty name field`, `#fb4934`)
			}

			if (!linkNameInput.value.includes("/4")) {
				viewName(`Not dividing by 4`, `#fb4934`)
			}

			if (!specialCharacters.test(linkNameInput.value)) {
				viewName(`No special characters`, `#fb4934`)
			}
		}

		function changeAge() {
			calculateAge = Math.round(linkAgeInput.value / 31557600000)

			if (calculateAge < 18) {
				viewAge(calculateAge + " years old - Not old enough", `#fb4934`)
			}

			if (calculateAge >= 18) {
				viewAge(calculateAge + " years old - Old enough", `#b8bb26`)
			}
		}
	</script>
</body>

</html>
