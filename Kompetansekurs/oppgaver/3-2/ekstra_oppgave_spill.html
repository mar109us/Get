<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Spill - Reaksjon</title>
</head>

<style>
	:root {
		user-select: none;

		--background: #1d2021;
		--highlight: #665c54;
		--gray: #928374;
		--bright_red: #fb4934;
		--bright_green: #b8bb26;
		--bright_yellow: #fabd2f;
		--bright_blue: #83a598;
		--bright_purple: #d3869b;
		--bright_aqua: #8ec07c;
		--bright_orange: #fe8019;
	}

	body {
		background-color: var(--background);
		font-family: monospace;
		justify-items: center;
	}

	.game-content {
		background-color: #665c54;
		display: grid;

		grid-template-columns: repeat(1, 1fr 2fr 1fr);

		min-width: fit-content;
		max-width: fit-content;

		justify-items: center;

		margin-left: 20%;
		margin-right: 20%;
		padding-top: 10px;
		padding-bottom: 10px;
	}

	.text-click-to-play {
		font-size: 2em;
		pointer-events: none;
		position: absolute;
		justify-self: center;
		align-self: center;
		color: var(--bright_yellow);
	}

	.container-two-items {
		display: grid;
		grid-template-columns: repeat(2, 200px);
		grid-template-rows: 200px;
		gap: 12px;
		justify-content: center;
		margin: 10px;
	}

	.item {
		background-color: var(--gray);
		height: 200px;
		width: 200px;
		border: 4px solid var(--highlight);
	}

	#results {
		color: var(--bright_yellow);
		font-size: 1.5em;
		font-family: monospace;
		text-align: start;
	}

	#score {
		color: var(--bright_yellow);
		font-size: 2em;
		font-family: monospace;
		text-align: end;
	}
</style>

<body>



	<div class="game-content">
		<div>
			<p id="results"></p>
		</div>
		<div class="text-click-to-play">
			<h1>click to play</h1>
		</div>
		<div>
			<div class="container-two-items">
				<div onclick="squareClicked(1)" id="square-1x1" class="item"> </div>
				<div onclick="squareClicked(2)" id="square-1x2" class="item"> </div>
				<div onclick="squareClicked(3)" id="square-2x1" class="item"> </div>
				<div onclick="squareClicked(4)" id="square-2x2" class="item"> </div>
			</div>
		</div>
		<div>
			<p id="score">1566</p>
		</div>
	</div>

	<script>

		const getElement = (calledId) => document.getElementById(calledId)

		const activeElement = (element) => (element).style.backgroundColor = "var(--bright_yellow)";

		const inactiveElement = (element) => (element).style.backgroundColor = "var(--gray)";

		const square = {
			position: {
				1: getElement("square-1x1"),
				2: getElement("square-1x2"),
				3: getElement("square-2x1"),
				4: getElement("square-2x2")
			}
		}

		const element = {
			timedResults: getElement("results"),
			score: getElement("score")
		}

		let currentActiveSquare = ""
		let previousNumber = null
		let nextNumber = null
		let timesClicked = null
		let currentScore = null

		let getTime = {
			start: null,
			end: null,
		}

		function selectedIndex(index) {
			clearActiveSquare()
			previousNumber = index
			currentActiveSquare = square.position[index]
			activeElement(square.position[index])
		}

		function squareClicked(square) {
			if (currentActiveSquare === "") {
				getRandomNumber()
			}

			if (square === previousNumber) {
				getTime.end = new Date().getTime()
				timesClicked = timesClicked + 1
				element.timedResults.innerHTML += `${timesClicked}: ${(getTime.end - getTime.start) / 1000}<br>`

				if ((getTime.end - getTime.start) < 1000) {
					currentScore += 10
					console.log("score", currentScore)
				}
				if ((getTime.end - getTime.start) < 900) {
					currentScore += 15
					console.log("score", currentScore)
				}
				if ((getTime.end - getTime.start) < 800) {
					currentScore += 20
					console.log("score", currentScore)
				}
				if ((getTime.end - getTime.start) < 700) {
					currentScore += 25
					console.log("score", currentScore)
				}


				/* element.score.innerHTML +=  */

				getRandomNumber()
			}
		}

		function getRandomNumber() {
			nextNumber = Math.floor(Math.random() * 4) + 1
			noRepeatNumber()
		}

		function noRepeatNumber() {
			if (previousNumber === nextNumber) {
				getRandomNumber()
			}
			else {
				getTime.start = new Date().getTime()
				selectedIndex(nextNumber)
			}

		}

		function clearActiveSquare() {
			if (currentActiveSquare) {
				return inactiveElement(currentActiveSquare)
			}
		}

	</script>

</body>

</html>
