<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Spill - Reaksjon</title>
</head>

<style>
	:root {
		--background: #1d2021;
		--highlight: #665c54;
		--gray: #928374;
		--bright_red: #fb4934;
		--bright_green: #b8bb26;
		--bright_yellow: #fabd2f;
		--bright_blue: #83a598;
		--bright_purple: #d3869b;
		--bright_aqua: #8ec07c;
		--bright_orange: #fe8019;
	}

	body {
		background-color: var(--background);
		font-family: monospace;
		justify-items: center;
	}

	h1 {
		font-size: 3em;
		color: var(--bright_blue);
	}

	.container-one-items {
		display: grid;
		gap: 12px;
		justify-content: center;
		margin: 10px;
	}

	.game-content {
		background-color: #665c54;
		display: grid;

		grid-template-columns: repeat(1, 1fr 2fr 1fr);

		min-width: fit-content;
		max-width: fit-content;
		justify-items: center;
		margin-left: 20%;
		margin-right: 20%;
		padding-top: 100px;
		padding-bottom: 100px;

	}

	.container-two-items {
		display: grid;
		grid-template-columns: repeat(2, 200px);
		grid-template-rows: 200px;
		gap: 12px;
		justify-content: center;
		margin: 10px;
	}

	.item {
		background-color: var(--gray);
		height: 200px;
		width: 200px;
		border: 4px solid var(--highlight);
	}
</style>

<body>

	<div class="container-one-items">
		<h1>click a square to start</h1>
	</div>

	<div class="game-content">
		<div>
			<p>hello</p>
			<p>hello</p>
			<p>hello</p>
			<p>hello</p>
			<p>hello</p>
			<p>hello</p>
			<p>hello</p>
			<p>hello</p>
			<p>hello</p>
			<p>hello</p>
		</div>

		<div>
			<div class="container-two-items">
				<div onclick="squareClicked(1)" id="square-1x1" class="item"> </div>
				<div onclick="squareClicked(2)" id="square-1x2" class="item"> </div>
				<div onclick="squareClicked(3)" id="square-2x1" class="item"> </div>
				<div onclick="squareClicked(4)" id="square-2x2" class="item"> </div>
			</div>
		</div>

		<div>
			<p>hello</p>
			<p>hello</p>
			<p>hello</p>
		</div>
	</div>

	<script>

		const getElement = (calledId) => document.getElementById(calledId)

		const activeElement = (element) => (element).style.backgroundColor = "var(--bright_yellow)";

		const inactiveElement = (element) => (element).style.backgroundColor = "var(--gray)";

		const square = {
			position: {
				1: getElement("square-1x1"),
				2: getElement("square-1x2"),
				3: getElement("square-2x1"),
				4: getElement("square-2x2")
			}
		}

		let currentActiveSquare = ""
		let randomNumber = 0
		let newRandomNumber = 0

		let getTime = {
			start: null,
			end: null,

		}



		function selectedIndex(index) {
			console.log("selectedIndex")

			randomNumber = index

			currentActiveSquare = square.position[index]
			activeElement(square.position[index])
		}

		function squareClicked(square) {
			console.log("squareClicked")

			if (!currentActiveSquare) {
				console.log("nothing to click yet")
				getRandomNumber()
			}

			if (square === randomNumber) {
				console.log("clicked correct")
				getTime.end = new Date().getTime()
				console.log((getTime.end - getTime.start) / 1000)
				console.log()
				getRandomNumber()
			}
			else {
				console.log("clicked wrong")
			}
		}

		function getRandomNumber() {
			console.log("getRandomNumber")

			if (currentActiveSquare) { clearActiveSquare() }

			newRandomNumber = Math.floor(Math.random() * 4) + 1

			if (randomNumber === newRandomNumber) { getRandomNumber() }

			getTime.start = new Date().getTime()

			selectedIndex(newRandomNumber)

		}

		function clearActiveSquare() {
			console.log("clearActiveSquare")

			inactiveElement(currentActiveSquare)
		}

	</script>

</body>

</html>
