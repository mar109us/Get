<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Spill - Reaksjon</title>
</head>

<style>
	:root {
		--background: #1d2021;
		--gray: #928374;
		--bright_red: #fb4934;
		--bright_green: #b8bb26;
		--bright_yellow: #fabd2f;
		--bright_blue: #83a598;
		--bright_purple: #d3869b;
		--bright_aqua: #8ec07c;
		--bright_orange: #fe8019;
	}

	body {
		background-color: var(--background);

	}

	.container-one-items {
		display: grid;
		grid-template-columns: 100px;
		grid-template-rows: 100px;
		gap: 2px;
		justify-content: center;
		margin: 10px;
	}

	.container-two-items {
		display: grid;
		grid-template-columns: repeat(2, 100px);
		grid-template-rows: 100px;
		gap: 2px;
		justify-content: center;
		margin: 10px;


	}

	.item {
		background-color: var(--gray);
		height: 100px;
		width: 100px;
	}
</style>

<body>
	<div class="container-one-items">
		<div class="item"> </div>
	</div>

	<div class="container-two-items">
		<div class="item"> </div>
		<div class="item"> </div>
		<div class="item"> </div>
		<div class="item"> </div>
	</div>

</body>

</html>
