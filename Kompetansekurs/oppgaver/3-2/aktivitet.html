<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Do something</title>
</head>

<style>
	body {
		background-color: black;
		font-family: monospace;
	}

	input {
		width: 40%;
		height: 100px;
		font-size: 80px;
	}

	h1 {
		color: white;
		font-size: 80px;
		text-align: left;
		width: 40%;
		padding-left: 7%;

	}

	h2 {
		color: white;
		font-size: 40px;
		text-align: left;
		width: 40%;
		padding-left: 7%;

	}

	h4 {
		color: rgb(146, 146, 146);
		font-size: 20px;
		text-align: left;
		width: 40%;
		padding-left: 7%;
	}

	.container {
		display: flex;
		flex-direction: row;
		flex-wrap: wrap;
		justify-content: space-evenly;
	}

	.text-container {
		display: flex;
		flex-direction: row;
		flex-wrap: wrap;
	}

	.test {
		justify-items: center;
	}
</style>

<body>

	<div class="text-container">
		<h1>Name</h1>
		<h1>Age</h1>
	</div>

	<!-- <form class="container"> -->
	<div class="container">
		<input oninput="changeName()" id="name-input" type="text" placeholder="enter name"></form>
		<input oninput="changeAge()" id="age-input" type="text" placeholder="enter age"></form>
	</div>



	<div class="text-container">
		<h4>Must contain 2 letters or more<br>Must contain 1 special character<br>Must be divided by 4</h4>
		<h4>Must be 18 or older<br>Must be in milliseconds</h4>
	</div>

	<div class="container">
		<button onclick="changeName(), changeAge()" style="font-size: 50px; padding: 20px;">Submit</button>
	</div>

	<div class="text-container">
		<h2 id="name-output">Output</h2>
		<h2 id="age-output">Output</h2>
	</div>

	<div class="test">
		<h1>Captcha</h1>
	</div>

	<div class="container">
		<input oninput="checkIsHuman()" id="is-human-input" type="text" placeholder="i am human">
	</div>

	<div class="text-container">
		<h2 id="is-human-output">Output</h2>
	</div>

	<script>



		/* console.log("%c" + "test", "font-size:30px; font-weight:bold; background:#706060; color:#051120; padding:10px; border-radius:10px;") */

		//model
		const linkNameInput = document.getElementById("name-input")
		const linkAgeInput = document.getElementById("age-input")
		const linkIsHumanInput = document.getElementById("is-human-input")

		let linkNameOutput = document.getElementById("name-output")
		let linkAgeOutput = document.getElementById("age-output")
		let linkIsHumanOutput = document.getElementById("is-human-output")

		//view
		function checkName() {
			console.log(linkNameInput.value)
		}

		function checkAge() {
			console.log(linkAgeInput.value)
		}

		function checkIsHuman() {
			console.log(linkIsHumanInput.value)
		}

		//controller

		function logStart(functionName, style) {
			return console.group("%c" + `${functionName}`, logStyle(style))
		}



		function logContent(isActive, content, data) {

			console.log("%c" + content + data, logStyle(isActive))
		}

		function logStyle(type) {

			if (type === "function") {
				return `font-size: 1.6em; background:#96275F; color:#ffffff; padding:5px;`
			}

			if (type === false) {
				return `font-size: 1.2em; background:#962727; color:#ffffff; padding:5px`
			}

			if (type === true) {
				return `font-size: 1.2em; background:#27965F; color:#ffffff; padding:5px`
			}

			if (type === "yellow") {
				return `font-size: 1.2em; background:#965F27; color:#ffffff; padding:5px`
			}

			if (type === "blue") {
				return `font-size: 1.2em; background:#275F96; color:#ffffff; padding:5px`
			}
		}

		const variables = {
			group1: {
				var1: "test",
				var2: "yes"
			},
			group2: {
				var1: "yy",
				var2: "aa"
			}
		}


		consoleStyleVariable = "background:#3c3836; color:#d3869b; padding:4px;"
		consoleStyleData = "background:#3c3836; color:white; padding:4px;"
		consoleStyleGroup = "background:#3c3836; color:#fabd2f; padding:4px;"

		const consoleStyle = {
			groupStart: ""
		}

		console.group("%cvariables", `${consoleStyleGroup}`)
		for (const [key, value] of Object.entries(variables)) {

			console.log(`%c${key}: %c${value}`, `${consoleStyleVariable}`, `${consoleStyleData}`)
		}
		console.groupEnd()


		/* console.log(`%c${Object.keys.foreach(variables)} %c10345`, "color:#275F96;", "color:white;") */

		console.group("%cfunctionName()", "background:#3c3836; color:#fabd2f; padding:4px;")
		console.log("%c░▒ FAILED ▒░ %cdata", "background:#3c3836; color:#fb4934; padding:4px;", "background:#3c3836; color:white; padding:4px;")
		console.log("%c░▒ PASSED ▒░ %cdata", "background:#3c3836; color:#b8bb26; padding:4px;", "background:#3c3836; color:white; padding:4px;")
		console.log("%cvariableName %c10345", "background:#3c3836; color:#d3869b; padding:4px;", "background:#3c3836; color:white; padding:4px;")
		console.log("%cvariableName %c36662115", "background:#3c3836; color:#d3869b; padding:4px;", "background:#3c3836; color:white; padding:4px;")
		console.groupEnd()

		const specialCharacters = /[`!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?~]/

		function changeName() {
			logStart("changeName()", "function")





			if (linkNameInput.value.length >= 2) {
				linkNameOutput.innerHTML = `Hello ${parseInt(linkNameInput.value.replaceAll("/4", ""), 36) / 4}`
				linkNameOutput.style.color = `#b8bb26`
				logContent(true, "name length: ", linkNameInput.value.length)
			}

			if (linkNameInput.value.length < 2) {
				linkNameOutput.innerHTML = `"${linkNameInput.value}" not accepted as a name`
				linkNameOutput.style.color = `#fb4934`
				logContent(false, "name length: ", linkNameInput.value.length)
			}

			if (!linkNameInput.value) {
				linkNameOutput.innerHTML = `Can't submit with empty name field`
				linkNameOutput.style.color = `#fb4934`
				logContent(false, "name length: ", linkNameInput.value.length)
			}

			if (!linkNameInput.value.includes("/4")) {
				linkNameOutput.innerHTML = `Not dividing by 4`
				linkNameOutput.style.color = `#fb4934`
				logContent(linkNameInput.value.includes("/4"), "divide by 4 ", linkNameInput.value.includes("/4"))
			}

			if (!specialCharacters.test(linkNameInput.value)) {
				linkNameOutput.innerHTML = `No special characters`
				linkNameOutput.style.color = `#fb4934`
				logContent(specialCharacters.test(linkNameInput.value), "No special characters ", specialCharacters.test(linkNameInput.value))

			}

			console.log(parseInt(linkNameInput.value.replaceAll("/4", ""), 36) / 4)

			console.groupEnd()
		}



		function changeAge() {
			logStart("changeAge()", "function")

			calculateAge = Math.round(linkAgeInput.value / 31557600000)

			if (calculateAge < 18) {
				linkAgeOutput.innerHTML = calculateAge + " years old - Not old enough"
				linkAgeOutput.style.color = `#fb4934`
			}

			if (calculateAge >= 18) {
				linkAgeOutput.innerHTML = calculateAge + " years old - Old enough"
				linkAgeOutput.style.color = `#b8bb26`
			}



			logContent(false, "age value: ", linkAgeInput.value)

			console.groupEnd()
		}

		function changeIsHuman() {
			console.log(linkIsHumanInput.value)
		}


	</script>

</html>
