<head>

</head>

<style>
	body {
		background-color: black;

	input {

		justify-items: center;
	}
</style>

<body>

	<div class="text-container">
		<h1>Name</h1>
		<h1>Age</h1>
	</div>

	<!-- <form class="container"> -->
	<div class="container">
		<input oninput="changeName()" id="name-input" type="text" placeholder="enter name"></form>
		<input oninput="changeAge()" id="age-input" type="text" placeholder="enter age"></form>
	</div>

	<div class="text-container">
		<h4>Must contain 8 letters, 1 special character, and divided by 4</h4>
		<h4>Must be in milliseconds</h4>
	</div>

	<div class="text-container">
		<h2 id="name-output">Output</h2>
		<h2 id="age-output">Output</h2>
	</div>

	<div class="test">
		<h1>Captcha</h1>
	</div>

	<div class="container">
		<input oninput="checkIsHuman()" id="is-human-input" type="text" placeholder="i am human">
	</div>

	<div class="text-container">
		<h2 id="is-human-output">Output</h2>
	</div>

	<script>



		/* console.log("%c" + "test", "font-size:30px; font-weight:bold; background:#706060; color:#051120; padding:10px; border-radius:10px;") */

		//model
		const linkNameInput = document.getElementById("name-input")
		const linkAgeInput = document.getElementById("age-input")
		const linkIsHumanInput = document.getElementById("is-human-input")

		let linkNameOutput = document.getElementById("name-output")
		let linkAgeOutput = document.getElementById("age-output")
		let linkIsHumanOutput = document.getElementById("is-human-output")

		//view
		function checkName() {
			console.log(linkNameInput.value)
		}

		function checkAge() {
			console.log(linkAgeInput.value)
		}

		function checkIsHuman() {
			console.log(linkIsHumanInput.value)
		}












		//controller


		function logStart(functionName, style) {
			return console.group("%c" + `${functionName}`, logStyle(style))
		}



		function logContent(isActive, content, data) {

			console.log("%c" + content + data, logStyle(isActive))
		}

		function logStyle(type) {

			if (type === "function") {
				return `font: 1.6em "arial"; background:#96275F; color:#ffffff; padding:10px;`
			}

			if (type === false) {
				return `font: 1.2em "arial"; background:#962727; color:#ffffff; padding:10px`
			}

			if (type === true) {
				return `font: 1.2em "arial"; background:#27965F; color:#ffffff; padding:10px`
			}

			if (type === "yellow") {
				return `font: 1.2em "arial"; background:#965F27; color:#ffffff; padding:10px`
			}

			if (type === "blue") {
				return `font: 1.2em "arial"; background:#275F96; color:#ffffff; padding:10px`
			}


		}



		function changeName() {
			logStart("changeName()", "function")

			if (linkNameInput.value.length < 11) {
				logContent(false, "name length: ", linkNameInput.value.length)
			}

			if (linkNameInput.value.length >= 11) {
				/* linkNameOutput.innerHTML = linkNameInput.value */
				logContent(true, "name length: ", linkNameInput.value.length)
			}

			console.groupEnd()
		}
















		function changeAge() {
			console.log(linkAgeInput.value)
		}

		function changeIsHuman() {
			console.log(linkIsHumanInput.value)
		}


	</script>
