<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Læringsaktivitet</title>
</head>

<style>
	body {
		background-color: rgb(79, 90, 100);
		font-family: monospace;
	}

	h1 {
		text-align: center;
		font-size: 3em;
	}

	p {
		font-size: 1.5em;
	}

	#output {
		display: flex;
		flex-direction: row;
		flex-wrap: wrap;
		justify-content: space-evenly;
		gap: 10px;

	}

	#buttons {
		display: flex;
		flex-direction: row;
		flex-wrap: wrap;
		justify-content: space-evenly;
		gap: 10px;
	}

	.card {
		width: 25%;
		min-width: 300px;
		padding: 20px;
		margin: 10px;
		background-color: bisque;
	}

	.button {
		width: 25%;
		min-width: 300px;
		padding: 20px;
		margin-top: 20px;
		margin-bottom: 100px;
		background-color: rgb(180, 194, 214);
	}
</style>

<body>
	<div id="buttons"></div>
	<div id="output"></div>

</body>

<script>

	let cardElement = document.getElementById("output")

	let technologiesButton = makeButton("Teknologier", "tech()")
	let codingButton = makeButton("Programmering", "code()")

	function makeButton(text, action) {
		return `<div class="button" onclick="${action}"><h1>${text}</h1></div>`
	}

	function tech() {
		cardElement.innerHTML = ""
		return makeCard("HTML", "HTML er strukturen til en nettside.") +
			makeCard("CSS", "CSS er stylingen til en nettside.") +
			makeCard("JavaScript", "JavaScript er hvordan man kan lage ekstra interaktivitet på en nettside.")
	}

	function code() {
		cardElement.innerHTML = ""
		return makeCard("Funksjoner", "Funksjoner er en måte å skrive gjenbrukbar kode.") +
			makeCard("Variabler", "de vanligste måtene å sette en variabel er med 'let' eller 'const'. 'let' kan endres senere i koden mens 'const' kan ikke endres.") +
			makeCard("Parameter", "Parameter kan brukes for å sende verdier til en funksjon når du kaller funksjonen")
	}

	document.getElementById("buttons").innerHTML = `${technologiesButton} ${codingButton}`

	function makeCard(title, text) {
		cardElement.innerHTML += `<div class="card"><h1>${title}</h1> <p>${text}</p></div>`
	}

</script>

</html>
