<!DOCTYPE html>
<html lang="no">

<head>
	<meta charset="UTF-8">
	<title>Komponentbibliotek</title>
	<style>
		body {
			display: flex;
			flex-direction: column;
			align-items: center;
			font-family: monospace;
			font-size: 25px;
			padding: 32px;
			background: #99acbe;
		}


		.kort {
			display: flex;
			flex-direction: column;
			align-items: center;

			max-width: 500px;
			padding: 25px;

			border: 1px solid rgb(0, 0, 0);
			box-shadow: 0px 0px 10px black;
			border-radius: 20px;
		}

		.kort h2 {

			color: rgb(30, 107, 158);

		}

		.kort p {
			color: rgb(0, 0, 0);
		}

		.etikett {
			font-family:Arial, Helvetica, sans-serif;
			font-size: 15px;
			font-style: italic;
			background-color: rgb(161, 10, 10);
			border: 4px solid rgb(125, 5, 5);
			border-radius: 20px;
			padding: 8px;
			color: rgb(255, 226, 183);
			
			
		}

		/* Lag CSS for disse klassene slik at siden ser presentabel ut:
           .kort       — hvit boks med runde hjørner og skygge
           .kort h2    — farget overskrift
           .kort p     — grå brødtekst
           .etikett    — liten farget merkelapp (badge) */

	</style>
</head>

<body>
	<h1>Fagkort</h1>
	<div id="output"></div>

	<script>

		document.getElementById("output").innerHTML =
			lagKort("HTML",
`
HTML er selve oppsettet av en nettside,
og brukes for å legge til elementer som for eksempel

<button>
en knapp
</button>

<input style="width:81px;" placeholder="tekst områder">

<span style="border: 2px solid black; font-size:15px; padding-left: 5px; padding-right: 5px;">
eller elementer i elementer</span>

<br>

Det
<input type="checkbox" checked="true">

er

<input type="radio" checked="true">

mye

<input type="color" value="#000099">

morsomt

<img src="https://www.pinclipart.com/picdir/big/195-1956004_blazing-vitality-deviantart-a-pixel-art-pokemon-charmander.png" height="60px">

man



`,
"basics")

		function lagEtikett(tekst) {
			return "<span class='etikett'>" + tekst + "</span>"

		}

		function lagKort(tittel, tekst, etikett) {
			return '<div class="kort"><h2>' + tittel + "</h2><p>" + tekst + "</p>" + lagEtikett(etikett) + "</div>"

		}



		// OPPGAVE: Funksjoner med returverdi = gjenbrukbare komponenter

		// STEG 1:
		// Lag en funksjon lagEtikett(tekst)
		// Den skal RETURNERE en HTML-streng:
		// "<span class='etikett'>" + tekst + "</span>"


		// STEG 2:
		// Lag en funksjon lagKort(tittel, tekst, etikett)
		// Den skal RETURNERE en HTML-streng for et kort
		// Kortet skal inneholde:
		// - en <h2> med tittelen
		// - resultatet fra lagEtikett(etikett)
		// - en <p> med teksten
		// Husk class="kort" på ytterste div


		// STEG 3:
		// Bruk de to funksjonene til å fylle #output med minst fire kort
		// om temaer fra kurset (HTML, CSS, JavaScript, funksjoner, osv.)
		// Eksempel:
		// document.getElementById("output").innerHTML =
		//     lagKort("HTML", "Strukturen på en nettside", "Grunnlag") +
		//     lagKort(...) + ...


		// STEG 4 (bonus):
		// Lag en funksjon lagSeksjon(overskrift, innhold)
		// som returnerer en seksjon med en <h2> og innhold
		// Bruk den til å gruppere kortene i to seksjoner:
		// "Web-teknologier" og "Programmering"

	</script>
</body>

</html>
