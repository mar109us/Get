<!DOCTYPE html>
<html lang="no">

<head>
	<meta charset="UTF-8">
	<title>Komponentbibliotek</title>
	<style>
		.colours {
			color: #001219;
			color: #005f73;
			color: #0a9396;
			color: #94d2bd;
			color: #e9d8a6;
			color: #ee9b00;
			color: #ca6702;
			color: #bb3e03;
			color: #ae2012;
			color: #9b2226;

		}

		body {
			/* grid-template-columns: 1fr 1fr 1fr;
			gap: 50px; */
			justify-content: space-evenly;
			/* align-items: center; */
			font-family: monospace;
			font-size: 18px;
			/* padding: 32px; */
			background: #001219;
		}


		.kort {
			position: relative;
			display: flex;
			flex-direction: column;
			flex-wrap: wrap;

			min-width: 370px;
			max-width: 370px;
			padding: 30px;

			background-color: #005f73;

			/* border: 20px solid  inset #ffffff; */
			box-shadow: 0px 10px 25px 0px #ffffff28;
			border-top-right-radius: 150px;
			border-top-left-radius: 25px;
		}

		.kort h2 {
			text-align: center;
			color: #001219;

		}

		.kort p {
			color: #001219;
		}

		.etikett {
			position: absolute;
			bottom: -30px;
			right: 0px;
			width: 100%;
			height: 25px;
			text-align: center;
			line-height: 25px;
			font-family: Arial, Helvetica, sans-serif;
			font-size: 14px;
			font-style: italic;

			/* border: 4px solid rgb(125, 5, 5); */
			border-bottom-left-radius: 50px;
			border-bottom-right-radius: 50px;
			/* padding: 8px; */
			color: #9cb9c4;


		}

		.green-background {
			/* background-color: #0a9396; */
			/* border-top: 7px solid #00121949; */
			box-shadow: 0px -20px 30px 0px #005f73;
		}

		.red-background {
			background-color: rgb(161, 10, 10);
			border-left: 10px solid rgb(125, 5, 5);
		}

		#output {
			display: flex;
			flex-direction: row;
			gap: 50px;
			flex-wrap: wrap;
			justify-content: space-evenly;
			/* gap: 80px; */
		}

		.button {
			font-size: 40px;

			color: #001219;
			background-color: #ee9b00;
			text-align: center;

			width: fit-content;
			height: fit-content;

			padding: 10px;
			border-radius: 20px;
		}

		.header {
			position: relative;
			top: 0%;
			height: 20px;
			max-width: 100%;
			background-color: #005f73;
			margin-bottom: 50px;
		}

		/* Lag CSS for disse klassene slik at siden ser presentabel ut:
           .kort       — hvit boks med runde hjørner og skygge
           .kort h2    — farget overskrift
           .kort p     — grå brødtekst
           .etikett    — liten farget merkelapp (badge) */
	</style>
</head>

<body>
	<div class="header"></div>
	<div style="display:flex; justify-content: space-evenly; gap: 20px;">
		<div onclick="lagSeksjon('tech')" class="button">Web-Teknologier</div>
		<div onclick="lagSeksjon('programmering')" class="button">Programmering</div>
	</div>
	<br>
	<div id="output"></div>


	<script>

		function lagEtikett(tekst) {
			return "<span class='etikett green-background'>" + tekst + "</span>"

		}

		function lagKort(tittel, tekst, etikett) {
			return '<div class="kort"><h2>' + tittel + "</h2><p>" + tekst + "</p>" + lagEtikett(etikett) + "</div>"

		}

		// OPPGAVE: Funksjoner med returverdi = gjenbrukbare komponenter

		// STEG 1:
		// Lag en funksjon lagEtikett(tekst)
		// Den skal RETURNERE en HTML-streng:
		// "<span class='etikett'>" + tekst + "</span>"


		// STEG 2:
		// Lag en funksjon lagKort(tittel, tekst, etikett)
		// Den skal RETURNERE en HTML-streng for et kort
		// Kortet skal inneholde:
		// - en <h2> med tittelen
		// - resultatet fra lagEtikett(etikett)
		// - en <p> med teksten
		// Husk class="kort" på ytterste div


		// STEG 3:
		// Bruk de to funksjonene til å fylle #output med minst fire kort
		// om temaer fra kurset (HTML, CSS, JavaScript, funksjoner, osv.)
		// Eksempel:
		// document.getElementById("output").innerHTML =
		//     lagKort("HTML", "Strukturen på en nettside", "Grunnlag") +
		//     lagKort(...) + ...


		function lagSeksjon(overskrift, innhold) {

			if (overskrift === "tech") {

				return document.getElementById("output").innerHTML =
					"<h2 style='font-size: 40px;text-align: center; width:100%; color: white;'>Web-teknologier</h2>" +

					lagKort("HTML",
						`HTML er selve oppsettet av en nettside,
						og brukes for å legge til elementer som for eksempel 

						<br>
						<br>

						<button>
						en knapp
						</button>

						<input style="width:81px;" placeholder="tekst områder">

						<br><br>

						<span style="border: 2px solid black; font-size:15px; padding-left: 5px; padding-right: 5px;">
						eller elementer i elementer</span>

						<br><br>

						Det
						<input type="checkbox" checked="true">

						er

						<input type="radio" checked="true">

						mye

						<img src="https://www.pinclipart.com/picdir/big/195-1956004_blazing-vitality-deviantart-a-pixel-art-pokemon-charmander.png" height="60px">

						morsomt

						<br><br>

						<input type="color" value="#000099">

						man

						<input type="week">

						kan

						<br><br>

						<a href="">www.gjoere-i.html</a>

						</br>

						`,


						"mild 🌶️") +

					lagKort("CSS",

						`CSS brukes når HTML skal på selskap og må ta på seg dress og slips. <br>
						Det er koden man bruker for å style HTML elementer. <br>
						Man kan gjøre ting veldig fint med for eksemepel:
						<li><span style="color: white;">Endre farge</span></li>
						<li style="background-color: hotpink;">farge på bakgrunn</li>
						<li style="background-image: linear-gradient(to right, orange, darkred);">Lage gradients</li>
						<li><span style="font-family:times; font-size:30px;">og endre på font</span></li>
						<br>
						<li><span style="border: 2px solid black;">legge til borders</span></li>
						<br>
						<li><span style="box-shadow:0px 0px 15px 5px hotpink">eller skygger</span></li>
						<br>
						<li>og masse annet gøy!</li>
						<div style=" padding: 10px; width: 120px; height: max-content; position: absolute; top: 350px; left: 270px; box-shadow:0px 0px 10px 1px white">man kan også flytte containere within en annen om den er absolute og parent er relative</div>`,

						"a bit peppery 🌶️ 🌶️") +

					lagKort("JavaScript",
						`<p>JavaScript er selve funksjonaliteten til en nettside, og det finnes omtrent ingen begrensninger på hva du kan oppnå.</p>
						<p>Du kan også modifisere HTML og CSS med JS direkte, eller til og med lage helt nye elementer rett fra JS kode.</p>
						<p>Du kan gjøre alt fra å lage grafikk, generere lyder, mattematiske utregninger, behandle data og til og med lage spill.</p>`,

						"picante 🌶️ 🌶️ 🌶️")
			}

			if (overskrift === "programmering") {
				return document.getElementById("output").innerHTML =
					"<h2 style='font-size: 40px; text-align: center; width:100%; color: white;'>Programmering</h2>" +

					lagKort("Funksjoner",
						`<p>Med funksjoner kan du lage gjenbrukbar kode, om du for eksempel har en blokk med kode du ønsker å gjenta flere ganger.</p>
						<p>De kan kalles ved å bruke</p>
						<p>function funksjonsNavn() {</p>
						<p>- gjør noe her -</p>
						<p>}</p>`,

						"mild 🌶️") +

					lagKort("Parameter",
						`<p>Når du kaller en funksjon så kan du også sende data inne i parantesene. Parameterene inne i mottaker funksjonen er et semantiskt navn.</p>
						<p>&lt;div onclick="funksjonsNavn(verdiEn, verdiTo)"></p>
						<p>Om du klikker på div'en, kjør funksjonen den er rettet mot med disse verdiene som parameter</p>
						<p>function funksjonsNavn(navn1, navn2) {</p>
						<p>- gjør noe her -</p>
						<p>}</p>
						
						`,

						"somewhat spicy 🌶️ 🌶️") +

					lagKort("If / Else",
						`<p>Dette er en måte å lage logikk i koden.</p>
						<p>Du lager på en måte et lyskryss for koden, og om lyset er grønt, kjør framover.</p>
						<p>if (1 == 0) {  // false - kjører ikke</p>
						<p>}</p>
						<p>else { // true - kjører</p>
						<p>}</p>
						`,

						"mild 🌶️") +

					lagKort("Variabler",
						`<p>Man kan sette veldig mye rart i en variabel</p>
						<p>De vanligste måtene å sette en variabel på er med "let" eller "const"</p>
						<p>let variabelEn = 5</p>
						<p>const varaiabelTo = 10</p>
						<p>En const er en konstant variable, så den kan ikke endres senere</p>
						<p>en let variabel kan endres på senere</p>`,

						"mild 🌶️") +


					lagKort("Operatører",
						`<p>Man har forskjellige måter å endre på data eller sammenligne data.</p>
						<ul>
							<li> + pluss
							<li> - minus
							<li> * gange
							<li> / dele
							<li> = er lik
							<li> && foran OG bak
							<li> || foran ELLER bak
							<li> ! ikke - NOT
							<li> != ikke er lik
							<li> > større enn
							<li> >= større enn eller er lik
							<li> < mindre enn
							<li> <= mindre enn eller er lik
						</ul>
						`,

						"somewhat spicy 🌶️ 🌶️")

			}
		}
		lagSeksjon()


		// STEG 4 (bonus):
		// Lag en funksjon lagSeksjon(overskrift, innhold)
		// som returnerer en seksjon med en <h2> og innhold
		// Bruk den til å gruppere kortene i to seksjoner:
		// "Web-teknologier" og "Programmering"

	</script>
</body>

</html>
