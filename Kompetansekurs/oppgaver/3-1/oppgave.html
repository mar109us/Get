<!DOCTYPE html>
<html lang="no">

<head>
	<meta charset="UTF-8">
	<title>Komponentbibliotek</title>
	<style>
		.colours {
			color: #001219;
			color: #005f73;
			color: #0a9396;
			color: #94d2bd;
			color: #e9d8a6;
			color: #ee9b00;
			color: #ca6702;
			color: #bb3e03;
			color: #ae2012;
			color: #9b2226;

		}

		body {
			/* grid-template-columns: 1fr 1fr 1fr;
			gap: 16px;*/
			justify-content: space-evenly;
			/* align-items: center; */
			font-family: monospace;
			font-size: 18px;
			padding: 32px;
			background: #001219;
		}


		.kort {
			position: relative;
			display: flex;
			flex-direction: column;
			flex-wrap: wrap;

			min-width: 370px;
			max-width: 370px;
			padding: 30px;

			background-color: #005f73;

			/* border: 20px solid  inset #ffffff; */
			box-shadow: 0px 10px 50px 0px #ffffff28;
			border-top-right-radius: 150px;
			border-top-left-radius: 25px;
		}

		.kort h2 {
			text-align: center;
			color: #001219;

		}

		.kort p {
			color: #001219;
		}

		.etikett {
			position: absolute;
			bottom: -30px;
			right: 0px;
			width: 100%;
			height: 25px;
			text-align: center;
			line-height: 25px;
			font-family: Arial, Helvetica, sans-serif;
			font-size: 14px;
			font-style: italic;

			/* border: 4px solid rgb(125, 5, 5); */
			border-bottom-left-radius: 50px;
			border-bottom-right-radius: 50px;
			/* padding: 8px; */
			color: #9cb9c4;

		}

		.green-background {
			/* background-color: #0a9396; */
			/* border-top: 7px solid #00121949; */
			box-shadow: 0px -20px 50px 0px #005f73;
		}

		.red-background {
			background-color: rgb(161, 10, 10);
			border-left: 10px solid rgb(125, 5, 5);
		}

		#output {
			display: flex;
			flex-wrap: wrap;
			justify-content: space-evenly;
			gap: 80px;
		}

		.button {
			font-size: 40px;

			color: #001219;
			background-color: #ee9b00;
			text-align: center;

			width: fit-content;
			height: fit-content;

			padding: 10px;
			border-radius: 20px;
		}

		.header {
			position: relative;
			top: 0%;
			height: 20px;
			max-width: 100%;
			background-color: #005f73;
			margin-bottom: 50px;
		}

		/* Lag CSS for disse klassene slik at siden ser presentabel ut:
           .kort       — hvit boks med runde hjørner og skygge
           .kort h2    — farget overskrift
           .kort p     — grå brødtekst
           .etikett    — liten farget merkelapp (badge) */
	</style>
</head>

<body>
	<div class="header"></div>

		<div onclick="lagSeksjon('tech')" class="button">Web-Teknologier</div>

	</div>
	<div id="output"></div>

			return '<div class="kort"><h2>' + tittel + "</h2><p>" + tekst + "</p>" + lagEtikett(etikett) + "</div>"

			if (overskrift === "programmering") {

					lagKort("JavaScript",

		}



		// STEG 4 (bonus):
		// Lag en funksjon lagSeksjon(overskrift, innhold)
		// som returnerer en seksjon med en <h2> og innhold
		// Bruk den til å gruppere kortene i to seksjoner:

	</script>
</body>

</html>
