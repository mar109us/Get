<!DOCTYPE html>
<html lang="no">

<head>
	<meta charset="UTF-8">
	<title>Komponentbibliotek</title>
	<style>
		.colours {
			color: #001219;
			color: #005f73;
			color: #0a9396;
			color: #94d2bd;
			color: #e9d8a6;
			color: #ee9b00;
			color: #ca6702;
			color: #bb3e03;
			color: #ae2012;
			color: #9b2226;

		}

		body {
			/* grid-template-columns: 1fr 1fr 1fr;
			gap: 16px;
			justify-content: space-evenly; */
			/* align-items: center; */
			font-family: monospace;
			font-size: 18px;
			padding: 32px;
			background: #001219;
		}


		.kort {
			position: relative;
			display: flex;
			flex-direction: column;
			flex-wrap: wrap;

			max-width: 370px;
			padding: 30px;

			background-color: #005f73;

			/* border: 20px solid  inset #ffffff; */
			box-shadow: 0px 10px 50px 0px #ffffff28;
			border-top-right-radius: 150px;
			border-top-left-radius: 25px;
		}

		.kort h2 {
			text-align: center;
			color: #001219;

		}

		.kort p {
			color: #001219;
		}

		.etikett {
			position: absolute;
			bottom: -30px;
			right: 0px;
			width: 100%;
			height: 25px;
			text-align: center;
			line-height: 25px;
			font-family: Arial, Helvetica, sans-serif;
			font-size: 14px;
			font-style: italic;

			/* border: 4px solid rgb(125, 5, 5); */
			border-bottom-left-radius: 50px;
			border-bottom-right-radius: 50px;
			/* padding: 8px; */
			color: #9cb9c4;

		}

		.green-background {
			/* background-color: #0a9396; */
			/* border-top: 7px solid #00121949; */
			box-shadow: 0px -20px 50px 0px #005f73;
		}

		.red-background {
			background-color: rgb(161, 10, 10);
			border-left: 10px solid rgb(125, 5, 5);
		}

		#output {
			/* max-width: max-content; */
			display: flex;
			justify-content: space-evenly;
			gap: 25px;
			/* background-color: black; */
		}

		/* Lag CSS for disse klassene slik at siden ser presentabel ut:
           .kort       — hvit boks med runde hjørner og skygge
           .kort h2    — farget overskrift
           .kort p     — grå brødtekst
           .etikett    — liten farget merkelapp (badge) */
	</style>
</head>

<body>
	<div id="output"></div>

	<script>

		document.getElementById("output").innerHTML =
			lagKort("HTML",
				`

				"mild 🌶️")



		function lagEtikett(tekst) {
			return "<span class='etikett green-background'>" + tekst + "</span>"

		}

		function lagKort(tittel, tekst, etikett) {
			return '<div class="kort"><h2>' + tittel + "</h2><p>" + tekst + "</p>" + lagEtikett(etikett) + "</div>"

		}



		// OPPGAVE: Funksjoner med returverdi = gjenbrukbare komponenter

		// STEG 1:
		// Lag en funksjon lagEtikett(tekst)

		// Kortet skal inneholde:
		// - en <h2> med tittelen
		// - resultatet fra lagEtikett(etikett)
		// - en <p> med teksten
		// Husk class="kort" på ytterste div

		//     lagKort("HTML", "Strukturen på en nettside", "Grunnlag") +
		//     lagKort(...) + ...

		// Lag en funksjon lagSeksjon(overskrift, innhold)

	</script>
