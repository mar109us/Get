<!doctype html>
<html lang="no">

<head>
	<meta charset="UTF-8" />
	<title>Endre CSS fra JavaScript</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			padding: 32px;
			text-align: center;
		}

		#boks {
			width: 200px;
			height: 200px;
			background-color: #cccccc;
			border-radius: 12px;
			margin: 24px auto;
		}

		button {
			font-size: 18px;
			padding: 10px 20px;
			margin: 6px;
			cursor: pointer;
			border: none;
			border-radius: 8px;
			color: white;
		}

		.button-red {
			background-color: red;
		}

		.button-green {
			background-color: green;
		}

		.button-blue {
			background-color: blue;
		}

		.button-purple {
			background-color: purple;
		}
	</style>
</head>

<body>
	<h1>Fargevelger</h1>

	<div id="boks">
		<button onclick="changeColour('red')" class="button-red">Red</button>
		<button onclick="changeColour('green')" class="button-green">Green</button>
		<button onclick="changeColour('blue')" class="button-blue">Blue</button>
		<button onclick="changeColour('purple')" class="button-purple">Purple</button>

	</div>

	<script>

		function changeColour(colour) {
			console.log(colour)
			document.getElementById("boks").style.backgroundColor = colour
			console.log(colour)
		}

	</script>
</body>

</html>
