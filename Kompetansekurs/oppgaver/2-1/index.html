<!DOCTYPE html>
<html lang="no">

<head>
	<meta charset="UTF-8">
	<title>Kortgenerator</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			padding: 32px;
			background: #f0f4f8;
		}

		/* Lag CSS for .kort slik at hvert kort:
           - har hvit bakgrunn
           - har runde hjørner
           - har litt padding
           - har litt margin-bottom
           - ser presentabelt ut */
		.kort {
			background-color: white;
			border-radius: 20px;
			padding: 10px;
			margin-bottom: 5px;
			min-height: 100px;
		}

		/* Valgfritt: style overskriften og teksten inni kortene */

		#output {
			margin-top: 24px;
		}
	</style>
</head>

<body>

	<h1>Teknologier jeg har lært</h1>
	<div id="card-html" class="kort"></div>
	<div id="card-css" class="kort"></div>
	<div id="card-javascript" class="kort"></div>

	<script>

		function makeCard(id, title, text) {

			document.getElementById(id).innerHTML +=
				`
				<h1> ${title} </h1>
			<p> ${text} </p>

			`
		}

		makeCard("card-html", "HTML", "HTML is the structure of a website")
		makeCard("card-css", "CSS", "CSS is the style of a website")
		makeCard("card-javascript", "JavaScript", "Javascript is the functionality of a website")
